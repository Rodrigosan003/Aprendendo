<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Fim Google Fonts -->
    <!-- Início CSS -->
    <link rel="stylesheet" href="assets/CSS/style.css" />
    <!-- Fim CSS -->
    <title>Calculadora</title>
  </head>
  <body>
    <div class="container">
      <form class="form">
        <div class="in">
          <label for="first">Primeiro Número:</label>
          <input type="number" name="first" id="first" required />
          <label for="second">Segundo Número:</label>
          <input type="number" name="second" id="second" required />
        </div>
        <div class="operation">
          <button id="adicao">+</button>
          <button id="subtracao">-</button>
          <button id="multiplicacao">x</button>
          <button id="divisao">/</button>
        </div>
        <div class="action">
          <button id="limpar">C</button>
          <button id="igual" onclick="clicou()">=</button>
        </div>
        <div class="res" id="res">Resposta</div>
      </form>
    </div>
    <script src="assets/JS/script.js" defer></script>
  </body>
</html>
