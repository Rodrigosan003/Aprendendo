<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Efeito de Cards</title>
</head>
<body>
    <h1>Efeito de Cards</h1>
    <div class="cards-content">
        <div class="card card--1">
            <div class="card-inner">
                <h2>Scale</h2>
                <p>Amplia ao passar o mouse</p>
            </div>
        </div>
        <div class="card card--2">
            <div class="card-inner">
                <h2>3D Flip</h2>
                <p>Rotação 3D com perspectiva</p>
            </div>
        </div>
        <div class="card card--3">
            <div class="card-inner">
                <h2>Gradient</h2>
                <p>Surgimento de gradiente animado</p>
            </div>
        </div>
        <div class="card card--4">
            <div class="card-inner">
                <h2>Glow</h2>
                <p>Sombra e brilho sutis</p>
            </div>
        </div>
        <div class="card card--5">
            <div class="card-inner">
                <h2>Border</h2>
                <p>Contorno animado</p>
            </div>
        </div>
    </div>
    
</body>
</html>
