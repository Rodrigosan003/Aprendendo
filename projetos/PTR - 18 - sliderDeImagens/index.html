<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider de Imagens</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="slider">

    <button class="btn prev">&#10094;</button>

    <div class="slides">

        <img src="assets/images/img1.jpg" class="slide active" alt="">
        <img src="assets/images/img2.jpg" class="slide" alt="">
        <img src="assets/images/img3.jpg" class="slide" alt="">

    </div>

    <button class="btn next">&#10095;</button>

</div>

<script src="assets/js/scripts.js"></script>

</body>
</html>
